<!DOCTYPE html>
<html>
<head>
  <title>Fingerprint Pro Test</title>
</head>
<body>
  <h1>Fingerprint Pro Test</h1>

  <p id="output">Loading...</p>

  <script>
    const fpPromise = import('https://fpjscdn.net/v3/ALlHhnA59v7lsp29IpXq')
      .then(FingerprintJS => FingerprintJS.load());

    fpPromise
      .then(fp => fp.get())
      .then(result => {
        document.getElementById("output").innerText =
          "Visitor ID: " + result.visitorId;

        console.log(result);
      });
  </script>

</body>
</html>
